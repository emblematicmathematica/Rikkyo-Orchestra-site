name: Build CMS content

on:
  schedule:
    - cron: "17 3 1 4 *"
  push:
    paths:
      - "content/**"
      - "scripts/build-content.mjs"
      - "package.json"
      - ".pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update latest YouTube videos
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run update:youtube

      - name: Generate HTML
        run: npm run build

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- content/videos.json index.html news.html concerts.html concerts-archive.html video-archive.html join.html 'news-*.html'
          git diff --cached --quiet && exit 0
          git commit -m "Build CMS content"
          git push
